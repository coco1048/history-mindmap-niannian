<html lang="zh-CN">

<title>历史思维导图 - 填空背诵</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --main-bg:#FFF8F0;
  --title-bg:#E8652B;
  --title-text:#fff;
  --branch-bg:#FDE8D0;
  --branch-border:#E8A96A;
  --branch-text:#5C3A1E;
  --line-color:#B0A090;
  --blank-bg:#fff;
  --blank-border:#C8C0B8;
  --correct:#2E9E5A;
  --wrong:#D94040;
  --progress-bg:#E8DDD0;
  --progress-fill:#E8652B;
  --tab-bg:#F5EDE4;
  --tab-active:#E8652B;
  --tab-text:#8A7A6A;
  --sidebar-bg:#FBF5EE;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--main-bg);
  color:#3A2A1A;
}

/* Tab Bar */
.tab-bar{
  position:fixed;top:0;left:0;right:0;z-index:200;
  display:flex;align-items:center;
  background:#fff;
  border-bottom:2px solid rgba(200,180,160,.3);
  box-shadow:0 1px 4px rgba(0,0,0,.06);
  height:46px;
}
.tab-item{
  flex:1;text-align:center;
  padding:12px 8px;font-size:14px;font-weight:600;
  color:var(--tab-text);cursor:pointer;
  border-bottom:3px solid transparent;
  transition:all .2s;user-select:none;
  white-space:nowrap;
}
.tab-item:hover{color:#5C3A1E}
.tab-item.active{
  color:var(--tab-active);
  border-bottom-color:var(--tab-active);
}

/* Layout */
.app-layout{
  position:fixed;top:46px;bottom:0;left:0;right:0;
  display:flex;
}

/* Sidebar */
.sidebar{
  width:180px;flex-shrink:0;
  background:var(--sidebar-bg);
  border-right:1px solid rgba(200,180,160,.25);
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  padding:8px 0;
}
.sidebar-group-title{
  padding:8px 14px 4px;
  font-size:11px;font-weight:600;
  color:#B0A090;
  letter-spacing:.5px;
}
.sidebar-item{
  padding:8px 14px;
  font-size:13px;color:#6A5A4A;
  cursor:pointer;transition:all .15s;
  border-left:3px solid transparent;
  line-height:1.4;
  display:flex;align-items:center;
}
.sidebar-item:hover{background:rgba(232,101,43,.06);color:#3A2A1A}
.sidebar-item.active{
  background:rgba(232,101,43,.12);
  color:var(--tab-active);
  border-left-color:var(--tab-active);
  font-weight:600;
}
.sidebar-item .lesson-num{
  display:inline-flex;
  width:22px;height:22px;
  border-radius:50%;text-align:center;
  align-items:center;justify-content:center;
  background:#E8DDD0;color:#8A7A6A;
  font-size:11px;font-weight:700;
  margin-right:8px;flex-shrink:0;
}
.sidebar-item.active .lesson-num{
  background:var(--tab-active);color:#fff;
}
.sidebar-item .lesson-name{
  flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}

/* Main area */
.main-area{
  flex:1;display:flex;flex-direction:column;
  overflow:hidden;
}

/* Topbar */
.topbar{
  display:flex;align-items:center;justify-content:space-between;
  padding:8px 16px;
  background:rgba(255,248,240,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(200,180,160,.2);
  min-height:40px;
}
.topbar h1{font-size:15px;font-weight:600;color:#5C3A1E}
.topbar-btns{display:flex;gap:6px}
.topbar-btns button{
  padding:5px 12px;border-radius:8px;border:1.5px solid var(--branch-border);
  background:#fff;color:var(--branch-text);font-size:12px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.topbar-btns button:hover{background:var(--branch-bg)}
.topbar-btns button.active{background:var(--title-bg);color:#fff;border-color:var(--title-bg)}

/* Mindmap container */
.mindmap-container{
  flex:1;overflow:auto;padding:20px 16px 16px 24px;
  -webkit-overflow-scrolling:touch;
}

/* Mindmap */
.mindmap{
  display:flex;align-items:flex-start;gap:0;
  min-width:max-content;
}
.main-title{
  flex-shrink:0;
  background:var(--title-bg);
  color:var(--title-text);
  padding:12px 20px;
  border-radius:14px;
  font-size:16px;font-weight:700;
  letter-spacing:.5px;
  box-shadow:0 3px 12px rgba(232,101,43,.25);
  margin-top:30px;
  white-space:nowrap;
}
.h-connector{
  flex-shrink:0;display:flex;align-items:flex-start;
  margin-top:42px;width:36px;
}
.h-connector svg{width:36px;height:2px}
.branches-area{
  display:flex;flex-direction:column;gap:14px;
}
.branch-row{
  display:flex;align-items:flex-start;gap:0;
}
.branch-title{
  flex-shrink:0;
  background:var(--branch-bg);
  border:2px solid var(--branch-border);
  color:var(--branch-text);
  padding:8px 14px;
  border-radius:10px;
  font-size:14px;font-weight:600;
  cursor:pointer;user-select:none;
  transition:all .2s;white-space:nowrap;
}
.branch-title:hover{box-shadow:0 2px 8px rgba(232,169,106,.3)}
.branch-title .arrow{
  display:inline-block;margin-left:5px;font-size:11px;
  transition:transform .3s;
}
.branch-title.collapsed .arrow{transform:rotate(-90deg)}

.brace-area{
  flex-shrink:0;position:relative;
  width:32px;min-height:36px;
}
.brace-area svg{
  position:absolute;top:0;left:0;
  width:32px;height:100%;overflow:visible;
}
.points{
  display:flex;flex-direction:column;gap:5px;
  padding-top:2px;transition:all .3s ease;
  overflow:hidden;
}
.points.hidden{max-height:0!important;opacity:0;padding:0;margin:0;gap:0}
.points:not(.hidden){opacity:1}

.point{
  display:flex;align-items:center;gap:5px;
  font-size:13px;line-height:1.6;
  color:#4A3A2A;padding:2px 0;
}
.point .bullet{
  width:5px;height:5px;border-radius:50%;
  background:var(--branch-border);flex-shrink:0;
}

.blank-box{
  display:inline-flex;align-items:center;
  min-width:50px;
  border-bottom:2px dashed var(--blank-border);
  padding:1px 4px;margin:0 1px;
  position:relative;transition:all .2s;
}
.blank-box input{
  border:none;outline:none;background:transparent;
  font-size:13px;color:#3A2A1A;
  width:100%;min-width:36px;
  font-family:inherit;text-align:center;
  padding:1px 0;
}
.blank-box input::placeholder{color:#C8C0B8;font-size:11px}
.blank-box.correct{
  border-bottom-color:var(--correct);
  background:rgba(46,158,90,.08);border-radius:4px;
}
.blank-box.correct input{color:var(--correct);font-weight:600}
.blank-box.wrong{
  border-bottom-color:var(--wrong);
  background:rgba(217,64,64,.06);border-radius:4px;
  animation:shake .35s ease;
}
.blank-box.wrong input{color:var(--wrong)}
.blank-box.revealed{
  border-bottom:2px solid var(--correct);
  background:rgba(46,158,90,.08);border-radius:4px;
}
.blank-box.revealed input{color:var(--correct);font-weight:600}
.blank-icon{
  font-size:13px;margin-left:3px;flex-shrink:0;
  animation:popIn .3s ease;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-3px)}
  40%,80%{transform:translateX(3px)}
}
@keyframes popIn{
  0%{transform:scale(0)}100%{transform:scale(1)}
}

.review-mode .blank-box{
  border-bottom-style:solid;
  border-bottom-color:var(--correct);
  background:rgba(46,158,90,.08);border-radius:4px;
}
.review-mode .blank-box input{color:var(--correct);font-weight:600}

/* Progress */
.progress-wrap{
  padding:6px 16px 10px;
  background:rgba(255,248,240,.92);
  backdrop-filter:blur(8px);
  border-top:1px solid rgba(200,180,160,.2);
}
.progress-bar{
  height:5px;border-radius:3px;background:var(--progress-bg);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:3px;background:var(--progress-fill);
  transition:width .4s ease;width:0%;
}
.progress-text{
  text-align:center;margin-top:3px;font-size:11px;color:#9A8A7A;
}

/* Empty state */
.empty-state{
  display:flex;align-items:center;justify-content:center;
  flex:1;color:#B0A090;font-size:16px;
}

/* Responsive */
@media(max-width:1024px){
  .sidebar{width:150px}
  .sidebar-item{font-size:12px;padding:6px 10px}
  .mindmap-container{padding:16px 10px 16px 16px}
  .main-title{font-size:14px;padding:10px 14px;margin-top:20px}
  .h-connector{width:28px;margin-top:30px}
  .h-connector svg{width:28px}
  .branch-title{font-size:12px;padding:7px 10px}
  .brace-area{width:26px}
  .point{font-size:12px}
  .blank-box input{font-size:12px}
}
@media(max-width:768px){
  .tab-item{font-size:12px;padding:10px 4px}
  .sidebar{width:44px}
  .sidebar-group-title{display:none}
  .sidebar-item{
    padding:6px 4px;justify-content:center;
  }
  .sidebar-item .lesson-num{margin:0}
  .sidebar-item .lesson-name{display:none}
  .topbar{padding:6px 10px}
  .topbar h1{font-size:13px}
  .topbar-btns button{padding:4px 8px;font-size:11px}
  .mindmap-container{padding:12px 6px 12px 8px}
  .main-title{font-size:12px;padding:8px 10px;border-radius:8px;margin-top:10px}
  .h-connector{width:20px;margin-top:20px}
  .h-connector svg{width:20px}
  .branch-title{font-size:11px;padding:5px 8px;border-radius:6px}
  .brace-area{width:20px}
  .point{font-size:11px;line-height:1.5}
  .blank-box input{font-size:11px}
  .blank-box{min-width:40px}
}

.mindmap-container::-webkit-scrollbar{width:5px;height:5px}
.mindmap-container::-webkit-scrollbar-track{background:transparent}
.mindmap-container::-webkit-scrollbar-thumb{background:#D0C8C0;border-radius:3px}
.sidebar::-webkit-scrollbar{width:4px}
.sidebar::-webkit-scrollbar-track{background:transparent}
.sidebar::-webkit-scrollbar-thumb{background:#D8D0C8;border-radius:2px}
</style>
</head>

// STATE
let currentTab = 0;
let currentLesson = null;
let reviewMode = false;
let completed = {};
const STORAGE_KEY = "mindmap_history_all_v2";

function loadProgress() {
  try { const s = localStorage.getItem(STORAGE_KEY); if (s) completed = JSON.parse(s); } catch(e) {}
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch(e) {}
}
function resetProgress() {
  if (!confirm("确定要重置所有进度吗？")) return;
  completed = {};
  saveProgress();
  if (currentLesson) renderLesson(currentTab, currentLesson);
  updateProgress();
}

// FUZZY MATCH
function fuzzyMatch(input, answer) {
  const inp = input.trim().replace(/\s+/g, '');
  const ans = answer.trim().replace(/\s+/g, '');
  if (!inp) return false;
  if (inp === ans) return true;
  const clean = s => s.replace(/[年前左右约]/g, '');
  if (clean(inp) === clean(ans)) return true;
  if (ans.length >= 2 && inp.includes(ans)) return true;
  if (ans.length >= 2 && ans.includes(inp) && inp.length >= ans.length * 0.5) return true;
  return false;
}

// TABS
function renderTabs() {
  const bar = document.getElementById('tabBar');
  bar.innerHTML = '';
  ALL_DATA.forEach((vol, idx) => {
    const t = document.createElement('div');
    t.className = 'tab-item' + (idx === currentTab ? ' active' : '');
    t.textContent = vol.tabName;
    t.onclick = () => switchTab(idx);
    bar.appendChild(t);
  });
}
function switchTab(idx) {
  currentTab = idx;
  currentLesson = null;
  renderTabs();
  renderSidebar();
  showEmpty();
}

// SIDEBAR
function renderSidebar() {
  const sb = document.getElementById('sidebar');
  sb.innerHTML = '';
  const vol = ALL_DATA[currentTab];
  let curUnit = '';
  vol.lessons.forEach(lesson => {
    const um = lesson.title.match(/第[一二三四五六七八九十]+单元/);
    if (um && um[0] !== curUnit) {
      curUnit = um[0];
      const g = document.createElement('div');
      g.className = 'sidebar-group-title';
      g.textContent = curUnit;
      sb.appendChild(g);
    }
    const item = document.createElement('div');
    item.className = 'sidebar-item' + (currentLesson === lesson.num ? ' active' : '');
    item.innerHTML = '<span class="lesson-num">' + lesson.num + '</span><span class="lesson-name">' + lesson.name + '</span>';
    item.onclick = () => selectLesson(lesson.num);
    sb.appendChild(item);
  });
}
function selectLesson(num) {
  currentLesson = num;
  renderSidebar();
  renderLesson(currentTab, num);
}

// EMPTY STATE
function showEmpty() {
  document.getElementById('emptyState').style.display = 'flex';
  document.getElementById('mindmap').style.display = 'none';
  document.getElementById('topbar').style.display = 'none';
  document.getElementById('progressWrap').style.display = 'none';
}

// RENDER LESSON
function renderLesson(tabIdx, lessonNum) {
  const vol = ALL_DATA[tabIdx];
  const lesson = vol.lessons.find(l => l.num === lessonNum);
  if (!lesson) return;

  document.getElementById('emptyState').style.display = 'none';
  document.getElementById('mindmap').style.display = 'flex';
  document.getElementById('topbar').style.display = 'flex';
  document.getElementById('progressWrap').style.display = 'block';
  document.getElementById('topbarTitle').textContent = '🧠 ' + lesson.name;

  const container = document.getElementById('mindmap');
  container.innerHTML = '';

  // Main title
  const titleEl = document.createElement('div');
  titleEl.className = 'main-title';
  titleEl.textContent = lesson.name;
  container.appendChild(titleEl);

  // H connector
  const hConn = document.createElement('div');
  hConn.className = 'h-connector';
  hConn.innerHTML = '<svg viewBox="0 0 36 2"><line x1="0" y1="1" x2="36" y2="1" stroke="var(--line-color)" stroke-width="2"/></svg>';
  container.appendChild(hConn);

  // Branches
  const branchesArea = document.createElement('div');
  branchesArea.className = 'branches-area';
  container.appendChild(branchesArea);

  lesson.branches.forEach((branch, bi) => {
    const row = document.createElement('div');
    row.className = 'branch-row';

    const bTitle = document.createElement('div');
    bTitle.className = 'branch-title';
    bTitle.dataset.branch = bi;
    bTitle.innerHTML = branch.name + '<span class="arrow">▾</span>';
    bTitle.onclick = () => toggleBranch(bi);
    row.appendChild(bTitle);

    const braceArea = document.createElement('div');
    braceArea.className = 'brace-area';
    braceArea.id = 'brace-' + bi;
    row.appendChild(braceArea);

    const pointsDiv = document.createElement('div');
    pointsDiv.className = 'points';
    pointsDiv.id = 'points-' + bi;

    branch.points.forEach(pt => {
      const pointEl = document.createElement('div');
      pointEl.className = 'point';

      const bullet = document.createElement('span');
      bullet.className = 'bullet';
      pointEl.appendChild(bullet);

      const parts = parsePointText(pt);
      parts.forEach(part => {
        if (part.type === 'text') {
          const span = document.createElement('span');
          span.textContent = part.value;
          pointEl.appendChild(span);
        } else {
          const blankBox = document.createElement('span');
          blankBox.className = 'blank-box';
          blankBox.id = 'blank-' + part.id;
          if (completed[part.id]) blankBox.classList.add('correct');
          if (reviewMode) blankBox.classList.add('revealed');

          const input = document.createElement('input');
          input.type = 'text';
          input.dataset.blankId = part.id;
          input.dataset.answer = part.answer;
          input.setAttribute('autocomplete', 'off');
          input.setAttribute('autocorrect', 'off');
          input.setAttribute('autocapitalize', 'off');
          input.setAttribute('spellcheck', 'false');

          if (completed[part.id]) {
            input.value = part.answer;
            input.readOnly = true;
          } else if (reviewMode) {
            input.value = part.answer;
            input.readOnly = true;
          } else {
            input.placeholder = '??';
            input.style.width = Math.max(36, part.answer.length * 14) + 'px';
            input.addEventListener('keydown', onBlankKeydown);
            input.addEventListener('blur', onBlankBlur);
          }
          blankBox.appendChild(input);

          if (completed[part.id]) {
            const icon = document.createElement('span');
            icon.className = 'blank-icon';
            icon.textContent = '✓';
            icon.style.color = 'var(--correct)';
            blankBox.appendChild(icon);
          }
          pointEl.appendChild(blankBox);
        }
      });
      pointsDiv.appendChild(pointEl);
    });

    row.appendChild(pointsDiv);
    branchesArea.appendChild(row);
  });

  requestAnimationFrame(() => {
    lesson.branches.forEach((_, bi) => drawBrace(bi));
    updateProgress();
  });
}

function parsePointText(pt) {
  const parts = [];
  const text = pt.text;
  const regex = /【([^】]+)】/g;
  let lastIndex = 0;
  let blankIdx = 0;
  let match;
  while ((match = regex.exec(text)) !== null) {
    if (match.index > lastIndex) {
      parts.push({ type: 'text', value: text.slice(lastIndex, match.index) });
    }
    const blank = pt.blanks[blankIdx];
    parts.push({ type: 'blank', id: blank.id, answer: blank.answer });
    blankIdx++;
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) {
    parts.push({ type: 'text', value: text.slice(lastIndex) });
  }
  return parts;
}

// BRACE
function drawBrace(branchIdx) {
  const braceArea = document.getElementById('brace-' + branchIdx);
  const pointsDiv = document.getElementById('points-' + branchIdx);
  if (!braceArea || !pointsDiv) return;

  const branchTitle = braceArea.previousElementSibling;
  const points = pointsDiv.querySelectorAll('.point');
  if (points.length === 0) { braceArea.innerHTML = ''; return; }

  const pRects = Array.from(points).map(p => p.getBoundingClientRect());
  const aRect = braceArea.getBoundingClientRect();

  const topY = pRects[0].top + pRects[0].height / 2 - aRect.top;
  const botY = pRects[pRects.length - 1].top + pRects[pRects.length - 1].height / 2 - aRect.top;
  const midY = (topY + botY) / 2;
  const totalH = botY - topY;
  const w = 32;

  braceArea.style.height = Math.max(36, botY + 8) + 'px';

  const curveR = Math.min(10, totalH / 4);
  let d = 'M 0 ' + topY;
  d += ' L ' + (w - curveR - 5) + ' ' + topY;
  d += ' Q ' + (w - 5) + ' ' + topY + ' ' + (w - 5) + ' ' + (topY + curveR);
  d += ' L ' + (w - 5) + ' ' + (midY - curveR);
  d += ' Q ' + (w - 5) + ' ' + midY + ' ' + w + ' ' + midY;
  d += ' Q ' + (w - 5) + ' ' + midY + ' ' + (w - 5) + ' ' + (midY + curveR);
  d += ' L ' + (w - 5) + ' ' + (botY - curveR);
  d += ' Q ' + (w - 5) + ' ' + botY + ' ' + (w - curveR - 5) + ' ' + botY;
  d += ' L 0 ' + botY;

  let lines = '';
  pRects.forEach(pr => {
    const y = pr.top + pr.height / 2 - aRect.top;
    lines += '<line x1="' + (w - 5) + '" y1="' + y + '" x2="' + (w + 2) + '" y2="' + y + '" stroke="var(--line-color)" stroke-width="1.5"/>';
  });

  braceArea.innerHTML = '<svg viewBox="0 0 ' + (w + 4) + ' ' + Math.max(36, botY + 8) + '" preserveAspectRatio="none" style="width:' + w + 'px;height:100%"><path d="' + d + '" fill="none" stroke="var(--line-color)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>' + lines + '</svg>';
}

// INTERACTIONS
function toggleBranch(idx) {
  const title = document.querySelector('.branch-title[data-branch="' + idx + '"]');
  const points = document.getElementById('points-' + idx);
  const brace = document.getElementById('brace-' + idx);
  if (!title || !points) return;
  const isCollapsed = title.classList.toggle('collapsed');

  if (isCollapsed) {
    points.style.maxHeight = points.scrollHeight + 'px';
    requestAnimationFrame(() => { points.classList.add('hidden'); points.style.maxHeight = '0px'; });
    if (brace) brace.style.opacity = '0';
  } else {
    points.classList.remove('hidden');
    points.style.maxHeight = points.scrollHeight + 100 + 'px';
    if (brace) brace.style.opacity = '1';
    setTimeout(() => drawBrace(idx), 350);
  }
}

function onBlankKeydown(e) {
  if (e.key === 'Enter') { e.preventDefault(); checkBlank(e.target); }
}
function onBlankBlur(e) { checkBlank(e.target); }

function checkBlank(input) {
  const blankId = input.dataset.blankId;
  const answer = input.dataset.answer;
  const blankBox = input.closest('.blank-box');
  if (!answer || !blankBox) return;
  if (completed[blankId]) return;

  const val = input.value.trim();
  if (!val) return;

  if (fuzzyMatch(val, answer)) {
    completed[blankId] = true;
    saveProgress();
    blankBox.classList.remove('wrong');
    blankBox.classList.add('correct');
    input.value = answer;
    input.readOnly = true;
    const icon = document.createElement('span');
    icon.className = 'blank-icon';
    icon.textContent = '✓';
    icon.style.color = 'var(--correct)';
    blankBox.appendChild(icon);
    updateProgress();
    focusNextBlank(blankId);
  } else {
    blankBox.classList.remove('wrong');
    void blankBox.offsetWidth;
    blankBox.classList.add('wrong');
    const icon = blankBox.querySelector('.blank-icon');
    if (icon) icon.remove();
    let xIcon = blankBox.querySelector('.blank-icon-x');
    if (!xIcon) {
      xIcon = document.createElement('span');
      xIcon.className = 'blank-icon blank-icon-x';
      xIcon.textContent = '✗';
      xIcon.style.color = 'var(--wrong)';
      blankBox.appendChild(xIcon);
      setTimeout(() => { if (xIcon.parentNode) xIcon.remove(); }, 1200);
    }
    setTimeout(() => input.select(), 50);
  }
}

function focusNextBlank(currentId) {
  const allBlanks = document.querySelectorAll('.blank-box input:not([readonly])');
  let found = false;
  for (const inp of allBlanks) {
    if (found) { inp.focus(); return; }
    if (inp.dataset.blankId === currentId) found = true;
  }
}

function toggleReview() {
  reviewMode = !reviewMode;
  const btn = document.getElementById('btnReview');
  btn.classList.toggle('active', reviewMode);
  btn.textContent = reviewMode ? '📖 复习中' : '📖 复习模式';
  document.getElementById('mindmapContainer').classList.toggle('review-mode', reviewMode);

  document.querySelectorAll('.blank-box').forEach(box => {
    const input = box.querySelector('input');
    if (!input) return;
    const blankId = input.dataset.blankId;
    const answer = input.dataset.answer;

    if (reviewMode) {
      if (!completed[blankId]) {
        input.value = answer;
        input.readOnly = true;
        box.classList.add('revealed');
        box.classList.remove('wrong');
        const xIcon = box.querySelector('.blank-icon-x');
        if (xIcon) xIcon.remove();
      }
    } else {
      if (!completed[blankId]) {
        input.value = '';
        input.readOnly = false;
        input.placeholder = '??';
        box.classList.remove('revealed');
      }
    }
  });
}

function updateProgress() {
  const vol = ALL_DATA[currentTab];
  if (!vol) return;
  const lesson = vol.lessons.find(l => l.num === currentLesson);
  if (!lesson) return;

  const allBlankIds = [];
  lesson.branches.forEach(b => b.points.forEach(p => p.blanks.forEach(bl => allBlankIds.push(bl.id))));
  const total = allBlankIds.length;
  const done = allBlankIds.filter(id => completed[id]).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = done + ' / ' + total + ' 已完成' + (pct === 100 ? ' 🎉' : '');
}

// RESIZE
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    if (currentLesson) {
      const vol = ALL_DATA[currentTab];
      const lesson = vol.lessons.find(l => l.num === currentLesson);
      if (lesson) lesson.branches.forEach((_, bi) => drawBrace(bi));
    }
  }, 200);
});

// INIT
loadProgress();
renderTabs();
renderSidebar();
