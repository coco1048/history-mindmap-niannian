<html lang="zh-CN"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>第2课 原始农耕生活 - 思维导图</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --main-bg:#FFF8F0;
  --title-bg:#E8652B;
  --title-text:#fff;
  --branch-bg:#FDE8D0;
  --branch-border:#E8A96A;
  --branch-text:#5C3A1E;
  --line-color:#B0A090;
  --blank-bg:#fff;
  --blank-border:#C8C0B8;
  --correct:#2E9E5A;
  --wrong:#D94040;
  --progress-bg:#E8DDD0;
  --progress-fill:#E8652B;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:"PingFang SC","Hiragino Sans GB","Microsoft YaHei",sans-serif;
  background:var(--main-bg);
  color:#3A2A1A;
}
/* 顶部栏 */
.topbar{
  position:fixed;top:0;left:0;right:0;z-index:100;
  display:flex;align-items:center;justify-content:space-between;
  padding:10px 20px;
  background:rgba(255,248,240,.92);
  backdrop-filter:blur(8px);
  border-bottom:1px solid rgba(200,180,160,.25);
}
.topbar h1{font-size:16px;font-weight:600;color:#5C3A1E}
.topbar-btns{display:flex;gap:8px}
.topbar-btns button{
  padding:6px 14px;border-radius:8px;border:1.5px solid var(--branch-border);
  background:#fff;color:var(--branch-text);font-size:13px;font-weight:500;
  cursor:pointer;transition:all .2s;
}
.topbar-btns button:hover{background:var(--branch-bg)}
.topbar-btns button.active{background:var(--title-bg);color:#fff;border-color:var(--title-bg)}

/* 进度条 */
.progress-wrap{
  position:fixed;bottom:0;left:0;right:0;z-index:100;
  padding:8px 20px 12px;background:rgba(255,248,240,.92);
  backdrop-filter:blur(8px);border-top:1px solid rgba(200,180,160,.2);
}
.progress-bar{
  height:6px;border-radius:3px;background:var(--progress-bg);overflow:hidden;
}
.progress-fill{
  height:100%;border-radius:3px;background:var(--progress-fill);
  transition:width .4s ease;width:0%;
}
.progress-text{
  text-align:center;margin-top:4px;font-size:12px;color:#9A8A7A;
}

/* 主容器 - 可滚动 */
.mindmap-container{
  position:absolute;top:52px;bottom:42px;left:0;right:0;
  overflow:auto;padding:30px 20px 20px 30px;
  -webkit-overflow-scrolling:touch;
}

/* 思维导图主体 */
.mindmap{
  display:flex;align-items:flex-start;gap:0;
  min-width:max-content;
}

/* 主标题 */
.main-title{
  flex-shrink:0;
  background:var(--title-bg);
  color:var(--title-text);
  padding:14px 22px;
  border-radius:14px;
  font-size:18px;font-weight:700;
  letter-spacing:1px;
  box-shadow:0 3px 12px rgba(232,101,43,.25);
  margin-top:40px;
  white-space:nowrap;
}

/* 横向连接线容器 */
.h-connector{
  flex-shrink:0;
  display:flex;align-items:flex-start;
  margin-top:55px;
  width:40px;
}
.h-connector svg{width:40px;height:2px}

/* 分支区域 */
.branches-area{
  display:flex;flex-direction:column;gap:18px;
}

/* 单个分支行 */
.branch-row{
  display:flex;align-items:flex-start;gap:0;
}

/* 分支标题框 */
.branch-title{
  flex-shrink:0;
  background:var(--branch-bg);
  border:2px solid var(--branch-border);
  color:var(--branch-text);
  padding:10px 18px;
  border-radius:12px;
  font-size:15px;font-weight:600;
  cursor:pointer;
  user-select:none;
  transition:all .2s;
  white-space:nowrap;
  position:relative;
}
.branch-title:hover{box-shadow:0 2px 8px rgba(232,169,106,.3)}
.branch-title .arrow{
  display:inline-block;margin-left:6px;font-size:12px;
  transition:transform .3s;
}
.branch-title.collapsed .arrow{transform:rotate(-90deg)}

/* 大括号连接区域 */
.brace-area{
  flex-shrink:0;
  position:relative;
  width:36px;
  min-height:40px;
}
.brace-area svg{
  position:absolute;top:0;left:0;
  width:36px;height:100%;
  overflow:visible;
}

/* 知识点列表 */
.points{
  display:flex;flex-direction:column;gap:6px;
  padding-top:2px;
  transition:all .3s ease;
  overflow:hidden;
}
.points.hidden{max-height:0!important;opacity:0;padding:0;margin:0;gap:0}
.points:not(.hidden){opacity:1}

/* 单个知识点 */
.point{
  display:flex;align-items:center;gap:6px;
  font-size:14px;line-height:1.6;
  color:#4A3A2A;
  padding:3px 0;
}
.point .bullet{
  width:6px;height:6px;border-radius:50%;
  background:var(--branch-border);flex-shrink:0;
}

/* 填空部分 */
.blank-box{
  display:inline-flex;align-items:center;
  min-width:60px;
  border-bottom:2px dashed var(--blank-border);
  padding:1px 6px;
  margin:0 2px;
  position:relative;
  transition:all .2s;
}
.blank-box input{
  border:none;outline:none;background:transparent;
  font-size:14px;color:#3A2A1A;
  width:100%;min-width:40px;
  font-family:inherit;
  text-align:center;
  padding:2px 0;
}
.blank-box input::placeholder{color:#C8C0B8;font-size:12px}
.blank-box.correct{
  border-bottom-color:var(--correct);
  background:rgba(46,158,90,.08);
  border-radius:4px;
}
.blank-box.correct input{color:var(--correct);font-weight:600}
.blank-box.wrong{
  border-bottom-color:var(--wrong);
  background:rgba(217,64,64,.06);
  border-radius:4px;
  animation:shake .35s ease;
}
.blank-box.wrong input{color:var(--wrong)}
.blank-box.revealed{
  border-bottom:2px solid var(--correct);
  background:rgba(46,158,90,.08);
  border-radius:4px;
}
.blank-box.revealed input{color:var(--correct);font-weight:600}
.blank-icon{
  font-size:14px;margin-left:4px;flex-shrink:0;
  animation:popIn .3s ease;
}

@keyframes shake{
  0%,100%{transform:translateX(0)}
  20%,60%{transform:translateX(-3px)}
  40%,80%{transform:translateX(3px)}
}
@keyframes popIn{
  0%{transform:scale(0)}100%{transform:scale(1)}
}

/* 复习模式显示答案 */
.review-mode .blank-box{
  border-bottom-style:solid;
  border-bottom-color:var(--correct);
  background:rgba(46,158,90,.08);
  border-radius:4px;
}
.review-mode .blank-box input{
  color:var(--correct);font-weight:600;
}

/* 响应式 iPad */
@media(max-width:1024px){
  .mindmap-container{padding:20px 12px 20px 16px}
  .main-title{font-size:15px;padding:10px 16px;margin-top:20px}
  .h-connector{width:24px;margin-top:35px}
  .h-connector svg{width:24px}
  .branch-title{font-size:13px;padding:8px 12px}
  .brace-area{width:28px}
  .point{font-size:13px}
  .blank-box input{font-size:13px}
}
@media(max-width:768px){
  .topbar{padding:8px 12px}
  .topbar h1{font-size:14px}
  .topbar-btns button{padding:5px 10px;font-size:12px}
  .mindmap-container{padding:14px 8px 14px 10px}
  .main-title{font-size:13px;padding:8px 12px;border-radius:10px;margin-top:10px}
  .h-connector{width:18px;margin-top:26px}
  .h-connector svg{width:18px}
  .branch-title{font-size:12px;padding:6px 10px;border-radius:8px}
  .brace-area{width:22px}
  .point{font-size:12px;line-height:1.5}
  .blank-box input{font-size:12px}
  .blank-box{min-width:50px}
}

/* 滚动条美化 */
.mindmap-container::-webkit-scrollbar{width:6px;height:6px}
.mindmap-container::-webkit-scrollbar-track{background:transparent}
.mindmap-container::-webkit-scrollbar-thumb{background:#D0C8C0;border-radius:3px}
</style>
</head>

        { text: "半坡人面鱼纹【彩陶盆】", blanks: [{id:"b14",answer:"彩陶盆",pos:1}] },
        { text: "会简单【纺织】、制衣", blanks: [{id:"b15",answer:"纺织",pos:1}] },
        { text: "乐器【陶埙】，磨制石器，骨器、角器，养猪和狗等，捕猎捕鱼", blanks: [{id:"b16",answer:"陶埙",pos:1}] }
      ]
    },
    {
      name: "良渚遗址",
      points: [
        { text: "约【5000】年前，出现早期国家", blanks: [{id:"b17",answer:"5000",pos:1}] },
        { text: "浙江余杭【良渚镇】", blanks: [{id:"b18",answer:"良渚镇",pos:1}] },
        { text: "【古城】、高台、玉器、祭坛", blanks: [{id:"b19",answer:"古城",pos:1}] }
      ]
    }
  ]
};

// ========== 状态管理 ==========
let reviewMode = false;
let completed = {};
const STORAGE_KEY = "mindmap_history_2_progress";

function loadProgress() {
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    if (saved) completed = JSON.parse(saved);
  } catch(e) {}
}
function saveProgress() {
  try { localStorage.setItem(STORAGE_KEY, JSON.stringify(completed)); } catch(e) {}
}
function resetProgress() {
  if (!confirm("确定要重置所有进度吗？")) return;
  completed = {};
  saveProgress();
  renderMindmap();
  updateProgress();
}

// ========== 模糊匹配 ==========
function fuzzyMatch(input, answer) {
  const inp = input.trim().replace(/\s+/g, '');
  const ans = answer.trim().replace(/\s+/g, '');
  if (!inp) return false;
  // 完全匹配
  if (inp === ans) return true;
  // 去掉"年""前"等常见后缀再比
  const clean = s => s.replace(/[年前左右约]/g, '');
  if (clean(inp) === clean(ans)) return true;
  // 包含关键词（答案的核心词在输入中存在）
  if (ans.length >= 2 && inp.includes(ans)) return true;
  if (ans.length >= 2 && ans.includes(inp) && inp.length >= ans.length * 0.5) return true;
  return false;
}

// ========== 渲染 ==========
function renderMindmap() {
  const container = document.getElementById('mindmap');
  container.innerHTML = '';

  // 主标题
  const titleEl = document.createElement('div');
  titleEl.className = 'main-title';
  titleEl.textContent = MINDMAP_DATA.title;
  container.appendChild(titleEl);

  // 横向连接线
  const hConn = document.createElement('div');
  hConn.className = 'h-connector';
  hConn.innerHTML = '<svg viewBox="0 0 40 2"><line x1="0" y1="1" x2="40" y2="1" stroke="var(--line-color)" stroke-width="2"/></svg>';
  container.appendChild(hConn);

  // 分支区域
  const branchesArea = document.createElement('div');
  branchesArea.className = 'branches-area';
  container.appendChild(branchesArea);

  MINDMAP_DATA.branches.forEach((branch, bi) => {
    const row = document.createElement('div');
    row.className = 'branch-row';
    row.dataset.branch = bi;

    // 分支标题
    const bTitle = document.createElement('div');
    bTitle.className = 'branch-title';
    bTitle.dataset.branch = bi;
    bTitle.innerHTML = `${branch.name}<span class="arrow">▾</span>`;
    bTitle.onclick = () => toggleBranch(bi);
    row.appendChild(bTitle);

    // 大括号区
    const braceArea = document.createElement('div');
    braceArea.className = 'brace-area';
    braceArea.id = `brace-${bi}`;
    row.appendChild(braceArea);

    // 知识点
    const pointsDiv = document.createElement('div');
    pointsDiv.className = 'points';
    pointsDiv.id = `points-${bi}`;

    branch.points.forEach((pt, pi) => {
      const pointEl = document.createElement('div');
      pointEl.className = 'point';

      const bullet = document.createElement('span');
      bullet.className = 'bullet';
      pointEl.appendChild(bullet);

      // 解析文本中的【】标记生成填空
      const parts = parsePointText(pt);
      parts.forEach(part => {
        if (part.type === 'text') {
          const span = document.createElement('span');
          span.textContent = part.value;
          pointEl.appendChild(span);
        } else {
          const blankBox = document.createElement('span');
          blankBox.className = 'blank-box';
          blankBox.id = `blank-${part.id}`;
          if (completed[part.id]) {
            blankBox.classList.add('correct');
          }
          if (reviewMode) {
            blankBox.classList.add('revealed');
          }

          const input = document.createElement('input');
          input.type = 'text';
          input.dataset.blankId = part.id;
          input.dataset.answer = part.answer;
          input.setAttribute('autocomplete', 'off');
          input.setAttribute('autocorrect', 'off');
          input.setAttribute('autocapitalize', 'off');
          input.setAttribute('spellcheck', 'false');

          if (completed[part.id]) {
            input.value = part.answer;
            input.readOnly = true;
          } else if (reviewMode) {
            input.value = part.answer;
            input.readOnly = true;
          } else {
            input.placeholder = '??';
            const ansLen = part.answer.length;
            input.style.width = Math.max(40, ansLen * 16) + 'px';
            input.addEventListener('keydown', onBlankKeydown);
            input.addEventListener('blur', onBlankBlur);
          }
          blankBox.appendChild(input);

          // 状态图标
          if (completed[part.id]) {
            const icon = document.createElement('span');
            icon.className = 'blank-icon';
            icon.textContent = '✓';
            icon.style.color = 'var(--correct)';
            blankBox.appendChild(icon);
          }

          pointEl.appendChild(blankBox);
        }
      });

      pointsDiv.appendChild(pointEl);
    });

    row.appendChild(pointsDiv);
    branchesArea.appendChild(row);
  });

  // 渲染后计算大括号
  requestAnimationFrame(() => {
    MINDMAP_DATA.branches.forEach((_, bi) => drawBrace(bi));
    updateProgress();
  });
}

function parsePointText(pt) {
  // 从 blanks 构建模板：将【xxx】替换为占位
  const parts = [];
  let text = pt.text;
  let blankIdx = 0;

  // 替换【】为占位符
  const regex = /【([^】]+)】/g;
  let lastIndex = 0;
  let match;
  while ((match = regex.exec(text)) !== null) {
    if (match.index > lastIndex) {
      parts.push({ type: 'text', value: text.slice(lastIndex, match.index) });
    }
    const blank = pt.blanks[blankIdx];
    parts.push({ type: 'blank', id: blank.id, answer: blank.answer });
    blankIdx++;
    lastIndex = match.index + match[0].length;
  }
  if (lastIndex < text.length) {
    parts.push({ type: 'text', value: text.slice(lastIndex) });
  }
  return parts;
}

// ========== 大括号绘制 ==========
function drawBrace(branchIdx) {
  const braceArea = document.getElementById(`brace-${branchIdx}`);
  const pointsDiv = document.getElementById(`points-${branchIdx}`);
  if (!braceArea || !pointsDiv) return;

  const branchTitle = braceArea.previousElementSibling;
  const points = pointsDiv.querySelectorAll('.point');
  if (points.length === 0) {
    braceArea.innerHTML = '';
    return;
  }

  const bRect = branchTitle.getBoundingClientRect();
  const pRects = Array.from(points).map(p => p.getBoundingClientRect());

  // 计算相对于 braceArea 的坐标
  const aRect = braceArea.getBoundingClientRect();

  const topY = pRects[0].top + pRects[0].height / 2 - aRect.top;
  const botY = pRects[pRects.length - 1].top + pRects[pRects.length - 1].height / 2 - aRect.top;
  const midY = (topY + botY) / 2;
  const totalH = botY - topY;
  const w = 36;

  braceArea.style.height = Math.max(40, botY + 10) + 'px';

  // 绘制大括号 SVG
  const curveR = Math.min(12, totalH / 4);
  let d = `M 0 ${topY}`;
  d += ` L ${w - curveR - 6} ${topY}`;
  d += ` Q ${w - 6} ${topY} ${w - 6} ${topY + curveR}`;
  d += ` L ${w - 6} ${midY - curveR}`;
  d += ` Q ${w - 6} ${midY} ${w} ${midY}`;
  d += ` Q ${w - 6} ${midY} ${w - 6} ${midY + curveR}`;
  d += ` L ${w - 6} ${botY - curveR}`;
  d += ` Q ${w - 6} ${botY} ${w - curveR - 6} ${botY}`;
  d += ` L 0 ${botY}`;

  // 水平短线连接到每个知识点
  let lines = '';
  pRects.forEach(pr => {
    const y = pr.top + pr.height / 2 - aRect.top;
    lines += `<line x1="${w - 6}" y1="${y}" x2="${w + 2}" y2="${y}" stroke="var(--line-color)" stroke-width="1.5"/>`;
  });

  braceArea.innerHTML = `<svg viewBox="0 0 ${w + 4} ${Math.max(40, botY + 10)}" preserveAspectRatio="none" style="width:${w}px;height:100%">
    <path d="${d}" fill="none" stroke="var(--line-color)" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/>
    ${lines}
  </svg>`;
}

// ========== 交互 ==========
function toggleBranch(idx) {
  const title = document.querySelector(`.branch-title[data-branch="${idx}"]`);
  const points = document.getElementById(`points-${idx}`);
  const brace = document.getElementById(`brace-${idx}`);
  const isCollapsed = title.classList.toggle('collapsed');

  if (isCollapsed) {
    points.style.maxHeight = points.scrollHeight + 'px';
    requestAnimationFrame(() => {
      points.classList.add('hidden');
      points.style.maxHeight = '0px';
    });
    brace.style.opacity = '0';
  } else {
    points.classList.remove('hidden');
    points.style.maxHeight = points.scrollHeight + 100 + 'px';
    brace.style.opacity = '1';
    setTimeout(() => drawBrace(idx), 350);
  }
}

function onBlankKeydown(e) {
  if (e.key === 'Enter') {
    e.preventDefault();
    checkBlank(e.target);
  }
}
function onBlankBlur(e) {
  checkBlank(e.target);
}

function checkBlank(input) {
  const blankId = input.dataset.blankId;
  const answer = input.dataset.answer;
  const blankBox = input.closest('.blank-box');
  if (!answer || !blankBox) return;

  // 已完成的不再检查
  if (completed[blankId]) return;

  const val = input.value.trim();
  if (!val) return;

  if (fuzzyMatch(val, answer)) {
    // 正确
    completed[blankId] = true;
    saveProgress();
    blankBox.classList.remove('wrong');
    blankBox.classList.add('correct');
    input.value = answer;
    input.readOnly = true;

    // 添加图标
    const icon = document.createElement('span');
    icon.className = 'blank-icon';
    icon.textContent = '✓';
    icon.style.color = 'var(--correct)';
    blankBox.appendChild(icon);

    updateProgress();

    // 跳到下一个未完成的空
    focusNextBlank(blankId);
  } else {
    // 错误
    blankBox.classList.remove('wrong');
    void blankBox.offsetWidth; // 触发 reflow 重新动画
    blankBox.classList.add('wrong');

    const icon = blankBox.querySelector('.blank-icon');
    if (icon) icon.remove();

    // 短暂显示×然后移除
    let xIcon = blankBox.querySelector('.blank-icon-x');
    if (!xIcon) {
      xIcon = document.createElement('span');
      xIcon.className = 'blank-icon blank-icon-x';
      xIcon.textContent = '✗';
      xIcon.style.color = 'var(--wrong)';
      blankBox.appendChild(xIcon);
      setTimeout(() => { if (xIcon.parentNode) xIcon.remove(); }, 1200);
    }

    // 选中输入内容方便重试
    setTimeout(() => input.select(), 50);
  }
}

function focusNextBlank(currentId) {
  const allBlanks = document.querySelectorAll('.blank-box input:not([readonly])');
  let found = false;
  for (const inp of allBlanks) {
    if (found) { inp.focus(); return; }
    if (inp.dataset.blankId === currentId) found = true;
  }
}

function toggleReview() {
  reviewMode = !reviewMode;
  const btn = document.getElementById('btnReview');
  btn.classList.toggle('active', reviewMode);
  btn.textContent = reviewMode ? '📖 复习中' : '📖 复习模式';

  const container = document.getElementById('mindmapContainer');
  container.classList.toggle('review-mode', reviewMode);

  // 更新所有空的状态
  document.querySelectorAll('.blank-box').forEach(box => {
    const input = box.querySelector('input');
    if (!input) return;
    const blankId = input.dataset.blankId;
    const answer = input.dataset.answer;

    if (reviewMode) {
      if (!completed[blankId]) {
        input.value = answer;
        input.readOnly = true;
        box.classList.add('revealed');
        // 移除错误标记
        box.classList.remove('wrong');
        const xIcon = box.querySelector('.blank-icon-x');
        if (xIcon) xIcon.remove();
      }
    } else {
      if (!completed[blankId]) {
        input.value = '';
        input.readOnly = false;
        input.placeholder = '??';
        box.classList.remove('revealed');
      }
    }
  });
}

function updateProgress() {
  const allBlankIds = [];
  MINDMAP_DATA.branches.forEach(b => b.points.forEach(p => p.blanks.forEach(bl => allBlankIds.push(bl.id))));
  const total = allBlankIds.length;
  const done = allBlankIds.filter(id => completed[id]).length;
  const pct = total > 0 ? Math.round(done / total * 100) : 0;

  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('progressText').textContent = `${done} / ${total} 已完成${pct === 100 ? ' 🎉' : ''}`;
}

// ========== 窗口调整重绘大括号 ==========
let resizeTimer;
window.addEventListener('resize', () => {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(() => {
    MINDMAP_DATA.branches.forEach((_, bi) => drawBrace(bi));
  }, 200);
});

// ========== 初始化 ==========
loadProgress();
renderMindmap();
</script>
